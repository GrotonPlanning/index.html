<style>
.viewer-wrapper {
  position: relative;
  font-family: Arial, sans-serif;
}

/* === Horizontal Gallery === */
.viewer {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  gap: 50px;
  padding: 40px;
  height: 80vh;
  align-items: center;
  scroll-behavior: smooth;
}

/* Hide scrollbar */
.viewer::-webkit-scrollbar {
  display: none;
}

.board {
  flex: 0 0 auto;
  scroll-snap-align: center;
  background: white;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  padding: 15px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Image container */
.board-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  max-height: 65vh;
  max-width: 90vw;
}

/* Handles portrait + landscape */
.board-inner img {
  max-height: 65vh;
  max-width: 90vw;
  width: auto;
  height: auto;
  object-fit: contain;
}

.board-title {
  text-align: center;
  margin-top: 10px;
  font-size: 15px;
}

/* === Navigation Buttons === */
.nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
  z-index: 10;
}

.nav.left { left: 10px; }
.nav.right { right: 10px; }

/* === Modal === */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
}

.modal img {
  max-width: 95%;
  max-height: 95%;
}

.modal.active {
  display: flex;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const viewer = document.getElementById("viewer");
  const boards = viewer.querySelectorAll(".board");

  let currentIndex = 0;

  const modal = document.getElementById("modal");
  const modalImg = document.getElementById("modalImg");

  function goToBoard(index) {
    if (index < 0) index = 0;
    if (index >= boards.length) index = boards.length - 1;

    boards[index].scrollIntoView({
      behavior: "smooth",
      inline: "center",
      block: "nearest"
    });

    currentIndex = index;
  }

  document.getElementById("nextBtn").addEventListener("click", function (e) {
    e.preventDefault();
    goToBoard(currentIndex + 1);
  });

  document.getElementById("prevBtn").addEventListener("click", function (e) {
    e.preventDefault();
    goToBoard(currentIndex - 1);
  });

  boards.forEach((board, index) => {
    board.addEventListener("click", function () {
      const img = board.querySelector("img").src;
      modalImg.src = img;
      modal.classList.add("active");
      currentIndex = index;
    });
  });

  modal.addEventListener("click", function () {
    modal.classList.remove("active");
  });

  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight") goToBoard(currentIndex + 1);
    if (e.key === "ArrowLeft") goToBoard(currentIndex - 1);
    if (e.key === "Escape") modal.classList.remove("active");
  });

});
</script>
